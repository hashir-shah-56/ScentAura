<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScentAura</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body>
    <nav class="navbar">
        <div class="hamburger" id="hamburger">☰</div>
        <div class="logo">ScentAura</div>

        <ul class="nav-links" id="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="#about">About Us</a></li>
        </ul>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search perfumes...">
            <div id="search-suggestions" class="search-suggestions"></div>
            <i class="fa fa-search"></i>
        </div>
        <div class="cart">
            <a href="cart.html" style="text-decoration: none; color: inherit;">
                <i class="fa fa-shopping-cart"></i>
                <span id="cart-count" class="cart-badge">0</span>
            </a>
        </div>
    </nav>
    <!-- checkout.html -->
    <div class="checkout-container">

        
        <div class="checkout-grid">
            <h1>Checkout</h1>

            <!-- LEFT: FORM -->
            <div class="checkout-form">
                <h2>Billing Details:</h2>

                <input type="text" id="name" placeholder="Full Name" required>
                <input type="email" id="email" placeholder="Email Address" required>
                <input type="text" id="address" placeholder="Address" required>
                <input type="text" id="city" placeholder="City" required>

            </div>
            
            <!-- RIGHT: ORDER SUMMARY -->
            <div class="checkout-summary">
                <h2>Your Order:</h2>
                
                <div id="checkout-items"></div>
                
                <h3>Total: Rs. <span id="checkout-total">0</span></h3>
                <button id="place-order-btn">Place Order</button>
            </div>

        </div>
        <script src="script.js"></script>
    </div>
</body>
